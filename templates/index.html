<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">💸 Smart Expense Dashboard</h2>

    <div class="card p-4 shadow mb-4">
        <form method="POST" action="/add">
            <input class="form-control mb-2" type="text" name="name" placeholder="Nom dépense" required>
            <input class="form-control mb-2" type="number" name="amount" placeholder="Montant" required>

            <select name="category" class="form-control mb-2">
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Other</option>
            </select>

            <button class="btn btn-success w-100">Ajouter</button>
        </form>
    </div>

    <div class="alert alert-info text-center">
        💰 Total: {{ total }} DH
    </div>

    <table class="table table-bordered bg-white shadow">
        <tr>
            <th>Nom</th>
            <th>Montant</th>
            <th>Category</th>
            <th>Action</th>
        </tr>

        {% for e in expenses %}
        <tr>
            <td>{{ e[1] }}</td>
            <td>{{ e[2] }} DH</td>
            <td>{{ e[3] }}</td>
            <td>
                <a href="/delete/{{ e[0] }}" class="btn btn-danger btn-sm">Supprimer</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <div class="card p-4 shadow mt-4">
        <h5 class="text-center">📊 Dépenses par catégorie</h5>
        <canvas id="myChart"></canvas>
    </div>

</div>

<script>
const data = {
    labels: {{ categories.keys()| list| tojson }},
    datasets: [{
        data: {{ categories.values()| list| tojson }},
        backgroundColor: ["#4CAF50", "#2196F3", "#FFC107", "#F44336"]
    }]
};

new Chart(document.getElementById('myChart'), {
    type: 'pie',
    data: data,
});
</script>

</body>
</html>
