{% extends "base.html" %}
{% block content %}
<style>
.auth-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.auth-card {
    width: 100%;
    max-width: 420px;
    border: none;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}
.auth-header {
    background: linear-gradient(135deg, #198754, #20c997);
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
}
.auth-header h3 {
    margin: 0;
    font-weight: 600;
}
.auth-header p {
    margin: 0.25rem 0 0;
    opacity: 0.7;
    font-size: 0.9rem;
}
.auth-body {
    padding: 2rem;
    background: #fff;
}
.auth-body .form-control {
    border-radius: 10px;
    padding: 0.75rem 1rem;
    border: 2px solid #e9ecef;
    transition: 0.2s;
}
.auth-body .form-control:focus {
    border-color: #198754;
    box-shadow: 0 0 0 3px rgba(25,135,84,0.15);
}
.auth-body .form-label {
    font-weight: 500;
    font-size: 0.85rem;
    color: #495057;
    margin-bottom: 0.3rem;
}
.auth-body .btn {
    border-radius: 10px;
    padding: 0.7rem;
    font-weight: 600;
}
.auth-footer {
    text-align: center;
    padding: 0 2rem 2rem;
    background: #fff;
}
.auth-footer a {
    color: #495057;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.2s;
}
.auth-footer a:hover {
    color: #212529;
    text-decoration: underline;
}
</style>

<div class="auth-wrapper">
    <div class="auth-card card">
        <div class="auth-header">
            <h3>Create account</h3>
            <p>Start tracking your expenses</p>
        </div>
        <form method="POST">
            <div class="auth-body">
                <label class="form-label">Username</label>
                <input name="username" class="form-control mb-3" placeholder="Choose a username" required autofocus>
                <label class="form-label">Password</label>
                <input name="password" type="password" class="form-control mb-4" placeholder="Choose a password" required>
                <button class="btn btn-success w-100">Create Account</button>
            </div>
            <div class="auth-footer">
                <a href="/login">Already have an account? Sign in</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
