<!DOCTYPE html>
<html>
<head>
<title>Expense Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {transition:0.3s;}
.card {border-radius:15px;transition:0.3s;}
.card:hover {transform:translateY(-5px);box-shadow:0 10px 25px rgba(0,0,0,0.2);}
.btn {transition:0.2s;}
.btn:hover {transform:scale(1.05);}
.fade-in {animation:fadeIn 1s;}
@keyframes fadeIn {from{opacity:0;}to{opacity:1;}}
.toast-msg {position:fixed;bottom:20px;right:20px;background:#28a745;color:#fff;padding:10px 20px;border-radius:10px;opacity:0;transition:0.5s;}
.toast-show {opacity:1;}
.loader {position:fixed;top:50%;left:50%;width:40px;height:40px;border:5px solid #ccc;border-top:5px solid #4CAF50;border-radius:50%;animation:spin 1s linear infinite;display:none;}
@keyframes spin {100%{transform:rotate(360deg);}}
</style>
</head>

<body class="bg-light fade-in">

<nav class="navbar navbar-dark bg-dark px-3">
<span class="navbar-brand">💸 Expense Pro</span>
<div>
<a href="/" class="btn btn-light btn-sm">Dashboard</a>
<a href="/add" class="btn btn-success btn-sm">Add</a>
<a href="/list" class="btn btn-info btn-sm">List</a>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
<button onclick="dark()" class="btn btn-warning btn-sm">🌙</button>
</div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

<div id="toast" class="toast-msg">✅ Done</div>
<div id="loader" class="loader"></div>

<script>
function dark(){
document.body.classList.toggle("bg-dark");
document.body.classList.toggle("text-white");
}

function showToast(){
let t=document.getElementById("toast");
t.classList.add("toast-show");
setTimeout(()=>t.classList.remove("toast-show"),2000);
}

document.querySelectorAll("form").forEach(f=>{
f.addEventListener("submit",()=>{
document.getElementById("loader").style.display="block";
});
});
</script>

</body>
</html>
